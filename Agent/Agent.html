<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="Agent.css">
</head>

<body>

<div class="container py-5">

    <h1 class="text-center mb-5">Agent Dashboard</h1>

    <!-- Cards -->
    <div class="d-flex flex-wrap justify-content-center gap-4">

        <!-- Current Task -->
        <div class="card" style="width:18rem;">
            <img src="thunder.jpg" class="card-img-top" alt="Current Task">

            <div class="card-body text-center">
                <h5 class="card-title">Current Task</h5>

                <p class="card-text">
                    View Current Task
                </p>

                <button>View</button>
            </div>
        </div>

        <!-- User Info -->
        <div class="card" style="width:18rem;">
            <img src="info.jpg" class="card-img-top" alt="Info">

            <div class="card-body text-center">
                <h5 class="card-title">User Info</h5>

                <p class="card-text">
                    About Uder
                </p>

                <button>Info</button>
            </div>
        </div>

        

        

    </div>

</div>

<!-- Footer -->

    <p class="mb-0">Contact Admin: admintams@gmail.com</p>
</footer>
-->

</body>
</html>

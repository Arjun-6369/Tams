<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="Customer.css">
</head>

<body>

<div class="container py-5">

    <h1 class="text-center mb-5">Customer Dashboard</h1>

    <!-- Cards -->
    <div class="d-flex flex-wrap justify-content-center gap-4">

        <!-- Customer Register -->
        <div class="card" style="width:18rem;">
            <img src="images.jpeg" class="card-img-top" alt="Customer Register">

            <div class="card-body text-center">
                <h5 class="card-title">Customer Register</h5>

                <p class="card-text">
                    Register a new customer into the system.
                </p>

                <button>Register</button>
            </div>
        </div>

        <!-- Register Complaint -->
        <div class="card" style="width:18rem;">
            <img src="issue.webp" class="card-img-top" alt="Complaint">

            <div class="card-body text-center">
                <h5 class="card-title">Register Complaint</h5>

                <p class="card-text">
                    Register a customer complaint.
                </p>

                <button>Complaint</button>
            </div>
        </div>

        <!-- Track Complaint -->
        <div class="card" style="width:18rem;">
            <img src="clock.jpg" class="card-img-top" alt="Complaint">

            <div class="card-body text-center">
                <h5 class="card-title">Track Complaint</h5>

                <p class="card-text">
                    Track complaint.
                </p>

                <button>Track</button>
            </div>
        </div>

        <!-- Feedback -->
        <div class="card" style="width:18rem;">
            <img src="feed.jpg" class="card-img-top" alt="Feedback">

            <div class="card-body text-center">
                <h5 class="card-title">Feedback</h5>

                <p class="card-text">
                    View and submit customer feedback.
                </p>

                <button>Feedback</button>
            </div>
        </div>

    </div>

</div>

<!-- Footer -->

</footer>
-->

</body>
</html>

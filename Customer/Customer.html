<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="Customer.css">

</head>
<body>

    
    <center>
    <h1>Customer</h1>

<div class="container mt-5">
    <div class="d-flex flex-wrap justify-content-center gap-4"></div>

        <!-- Customer Register -->
        <div class="card" style="width: 18rem;">
            <img src="images.jpeg" class="card-img-top" alt="Customer">
            <div class="card-body">
                <h5 class="card-title">Customer Register</h5>
                <p class="card-text">
                    Register a new customer into the system.
                </p>
                
                <button>Register</button>
            </div>
        </div>

        <!-- Register Complaint -->
        <div class="card" style="width: 18rem;">
            <img src="issue.webp" class="card-img-top" alt="Complaint">
            <div class="card-body">
                <h5 class="card-title">Register Complaint</h5>
                <p class="card-text">
                    Register a customer complaint.
                </p>
                <button>complaint</button>
                
            </div>
        </div>

        <!-- Feedback -->
        <div class="card" style="width: 18rem;">
            <img src="feed.jpg" class="card-img-top" alt="Feedback">
            <div class="card-body">
                <h5 class="card-title">Feedback</h5>
                <p class="card-text">
                    View and submit customer feedback.
                </p>
                <button>Feedback</button>
            
            </div>
        </div>

    </div>
</div>
</center>
<footer>
    <p >Contact Admin : admintams@gmail.com </p>
    
</footer>
</body>
</html>
